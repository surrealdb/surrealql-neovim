name: CI

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Neovim
        run: |
          curl -sL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
            | tar -xz -C /tmp
          echo "/tmp/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install plenary.nvim
        run: |
          PACK="$HOME/.local/share/nvim/site/pack/test/start"
          mkdir -p "$PACK"
          git clone --depth=1 https://github.com/nvim-lua/plenary.nvim "$PACK/plenary.nvim"

      - name: Run tests
        run: |
          nvim --headless --noplugin -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/ { minimal_mode = true }" \
            2>&1
